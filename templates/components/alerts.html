{% if messages %}
<div class="fixed top-20 right-4 z-50 max-w-md w-full space-y-3 pointer-events-none">
    {% for message in messages %}
    <div class="pointer-events-auto flex items-center p-4 rounded-2xl shadow-2xl backdrop-blur-xl transition-all duration-300 transform border animate-slide-in 
        {% if message.tags == 'error' %}
            bg-rose-500/90 text-white border-rose-400/40
        {% elif message.tags == 'warning' %}
            bg-amber-500/90 text-white border-amber-400/40
        {% elif message.tags == 'info' %}
            bg-sky-500/90 text-white border-sky-400/40
        {% else %}
            bg-emerald-500/90 text-white border-emerald-400/40
        {% endif %}">
        <div class="mr-3 text-xl">
            {% if message.tags == 'error' %}<i class="fa-solid fa-circle-exclamation"></i>
            {% elif message.tags == 'warning' %}<i class="fa-solid fa-triangle-exclamation"></i>
            {% elif message.tags == 'info' %}<i class="fa-solid fa-circle-info"></i>
            {% else %}<i class="fa-solid fa-circle-check"></i>{% endif %}
        </div>
        <div class="text-sm font-medium flex-1">{{ message }}</div>
        <button onclick="this.parentElement.remove()" class="ml-3 text-white/80 hover:text-white text-lg">
            <i class="fa-solid fa-xmark"></i>
        </button>
    </div>
    {% endfor %}
</div>
{% endif %}
