{% extends 'base/base.html' %}

{% block title %}Forgot Password | HireHub{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 bg-slate-50 dark:bg-slate-950">
    <div class="max-w-md w-full glass-card p-8 rounded-3xl shadow-2xl space-y-6">
        <div class="text-center space-y-2">
            <div class="w-12 h-12 rounded-2xl bg-amber-500 text-white flex items-center justify-center text-xl mx-auto shadow-lg">
                <i class="fa-solid fa-key"></i>
            </div>
            <h2 class="text-2xl font-black text-slate-900 dark:text-white">Recover Password</h2>
            <p class="text-xs text-slate-500">Enter your registered email address to receive password reset instructions.</p>
        </div>

        <form method="POST" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1.5">Registered Email</label>
                <input type="email" name="email" required placeholder="name@example.com" class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-white/70 dark:bg-slate-800/70 text-sm dark:text-white">
            </div>

            <button type="submit" class="w-full py-3.5 rounded-2xl bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-sm shadow-xl transition">
                Send Reset Authorization Link
            </button>
        </form>

        <div class="text-center text-xs text-slate-500 pt-2 border-t border-slate-100 dark:border-slate-800">
            Remember your credentials? <a href="{% url 'login' %}" class="font-bold text-indigo-600 hover:underline">Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}
